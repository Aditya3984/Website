<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLAGRO — Art Collective</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <div id="app">

    <!-- ── HEADER ── -->
    <header id="main-header">
      <div>
        <h1 id="header-title">FLAGRO</h1>
        <p id="header-tagline">Art Collective • IISER Berhampur</p>
      </div>
      <button id="menu-btn" onclick="openSidebar()" aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2A2A2A" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </header>

    <!-- ── DESKTOP SIDE NAV (visible only on 1100px+) ── -->
    <nav id="desktop-sidenav">
      <p class="sidenav-label">Navigate</p>
      <button class="sidenav-btn active" data-page="gallery" onclick="navigateTo('gallery')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5zm6 0a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1V5zM4 11a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-4zm6 0a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-4z"/></svg>
        Gallery
      </button>
      <button class="sidenav-btn" data-page="social" onclick="navigateTo('social')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Social
      </button>
      <button class="sidenav-btn" data-page="shop" onclick="navigateTo('shop')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2L3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6l-3-4H6zm0 2h12l2 2.67H4L6 4zm1 5h2v3h6V9h2v5H7V9z"/></svg>
        Shop
      </button>
      <button class="sidenav-btn" data-page="admin" onclick="navigateTo('admin')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.32.07-.64.07-.98s-.03-.67-.07-1l2.16-1.63c.19-.15.24-.42.12-.64l-2.05-3.55c-.12-.22-.39-.3-.61-.22l-2.55 1.03c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98L4.9 5.01c-.22-.08-.49 0-.61.22L2.24 8.78c-.13.22-.07.49.12.64L4.52 11c-.05.33-.08.67-.08 1s.03.66.08.98l-2.16 1.65c-.19.15-.24.42-.12.64l2.05 3.55c.12.22.39.3.61.22l2.55-1.02c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.55 1.02c.22.08.49 0 .61-.22l2.05-3.55c.12-.22.07-.49-.12-.64l-2.16-1.65z"/></svg>
        Admin
      </button>
      <p class="sidenav-footer">FLAGRO © 2025</p>
    </nav>

    <!-- ── MAIN CONTENT ── -->
    <main id="page-content"></main>

    <!-- ── BOTTOM NAV (mobile + tablet) ── -->
    <nav id="bottom-nav"></nav>

    <!-- ── SLIDE-OVER SIDEBAR (mobile + tablet) ── -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <aside id="sidebar-panel"></aside>

    <!-- ── TOAST ── -->
    <div id="toast"></div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
